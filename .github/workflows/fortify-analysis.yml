# Reusable workflow file for running Fortify on Demand SAST & Debricked scans if the following secrets are available:
# - OSS_FOD_TENANT
# - OSS_FOD_USER
# - OSS_FOD_PASSWORD
# These secrets are managed at github.com/fortify/fortify organization level, but may need to be granted access to for
# repositories that need to be scanned, and pull requests generated from forks will not have access to those secrets.
# In such cases, the FoD scan will be skipped without errors.

name: Fortify on Demand Scan

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to set up (e.g. 17, 21). Leave empty to skip Java setup.'
        type: string
        required: false
      node-version:
        description: 'Node.js version to set up (e.g. 20). Leave empty to skip Node.js setup.'
        type: string
        required: false
      dotnet-version:
        description: '.NET version to set up (e.g. 8.0). Leave empty to skip .NET setup.'
        type: string
        required: false
    secrets:
      OSS_FOD_TENANT:
        required: false
      OSS_FOD_USER:
        required: false
      OSS_FOD_PAT:
        required: false

jobs:
  checkSecrets:
    runs-on: ubuntu-latest
    steps:
    - name: Check Secrets
      shell: bash
      run: |
        if [[ -z "${OSS_FOD_TENANT}" || -z "${OSS_FOD_USER}" || -z "${OSS_FOD_PASSWORD}" ]]; then
          echo "::notice ::Not running FoD scan as OSS_FOD_TENANT, OSS_FOD_USER, and/or OSS_FOD_PASSWORD secrets haven't been defined"
        else
          echo DO_FOD_SCAN=true >> $GITHUB_ENV
        fi
      env:
        OSS_FOD_TENANT: ${{secrets.OSS_FOD_TENANT}}
        OSS_FOD_USER: ${{secrets.OSS_FOD_USER}}
        OSS_FOD_PASSWORD: ${{secrets.OSS_FOD_PAT}}
    outputs:
      DO_FOD_SCAN: ${{ env.DO_FOD_SCAN }}
              
  FoD-SAST-Scan:
    runs-on: ubuntu-latest
    needs: checkSecrets
    if: needs.checkSecrets.outputs.DO_FOD_SCAN
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check Out Source Code
        uses: actions/checkout@v4

      - name: Setup Java
        if: inputs.java-version != ''
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}

      - name: Setup Node.js
        if: inputs.node-version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup .NET
        if: inputs.dotnet-version != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Run FoD SAST scan
        uses: fortify/github-action@v3
        env:
          FOD_URL: https://ams.fortify.com/
          FOD_TENANT: ${{secrets.OSS_FOD_TENANT}}
          FOD_USER: ${{secrets.OSS_FOD_USER}}
          FOD_PASSWORD: ${{secrets.OSS_FOD_PAT}}
          FOD_LOGIN_EXTRA_OPTS: --socket-timeout=600s
          DO_SCA_SCAN: true
          DO_AVIATOR_AUDIT: true
          OVERRIDE_SAST_SETTINGS: true
          SETUP_EXTRA_OPTS: --sdlc-status Development --scan-types sast
